<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 单片机传感器监控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft Yahei", "微软雅黑", sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .change-pwd-container {
            width: 100%;
            max-width: 550px;
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 50px 60px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        .title {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .title::before {
            content: "🔒";
            font-size: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-size: 18px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.12);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }
        .submit-btn:hover {
            background: #1e3c72;
        }
        .msg {
            text-align: center;
            padding: 12px;
            margin-bottom: 25px;
            border-radius: 8px;
            font-size: 16px;
        }
        .msg.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .msg.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #2a5298;
            text-decoration: none;
            font-size: 16px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="change-pwd-container">
        <h2 class="title">修改密码</h2>

        {% if msg %}
        <div class="msg {{ 'success' if success else 'error' }}">
            {{ msg }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="old_pwd">原密码：</label>
                <input type="password" id="old_pwd" name="old_pwd" required placeholder="请输入原密码">
            </div>
            <div class="form-group">
                <label for="new_pwd">新密码：</label>
                <input type="password" id="new_pwd" name="new_pwd" required placeholder="请输入新密码（6-20位）">
            </div>
            <div class="form-group">
                <label for="confirm_pwd">确认新密码：</label>
                <input type="password" id="confirm_pwd" name="confirm_pwd" required placeholder="请再次输入新密码">
            </div>
            <button type="submit" class="submit-btn">确认修改</button>
        </form>

        <a href="/index" class="back-link">← 返回实时监控页面</a>
    </div>
</body>
</html>
